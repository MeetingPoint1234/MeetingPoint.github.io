<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Phone AI</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 1rem auto; padding: 0 1rem; }
    #chat { border: 1px solid #ccc; height: 350px; overflow-y: auto; padding: 0.5rem; margin-bottom: 0.5rem; }
    .user { color: #0066cc; margin: 0.3rem 0; }
    .ai { color: #2d8a2d; margin: 0.3rem 0; }
    input { width: 75%; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h3>🤖 My AI Assistant</h3>
  <div id="chat"></div>
  <input type="text" id="msg" placeholder="Ask something...">
  <button onclick="send()">Send</button>

  <script>
    // ⚠️ Replace with your actual DeepSeek API key
    const API_KEY = 'sk-abcdef1234567890';
    const API_URL = 'https://api.deepseek.com/v1/chat/completions';

    // Conversation memory
    let messages = [];

    async function send() {
      const input = document.getElementById('msg');
      const userMessage = input.value.trim();
      if (!userMessage) return;

      // Show user message
      messages.push({ role: 'user', content: userMessage });
      appendMessage('user', 'You: ' + userMessage);
      input.value = '';

      // Create AI message placeholder for streaming
      const aiDiv = document.createElement('div');
      aiDiv.className = 'ai';
      aiDiv.textContent = 'AI: ';
      const span = document.createElement('span');
      aiDiv.appendChild(span);
      document.getElementById('chat').appendChild(aiDiv);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: messages,
            stream: true
          })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const dataStr = line.slice(6).trim();
              if (dataStr === '[DONE]') continue;
              try {
                const json = JSON.parse(dataStr);
                const delta = json.choices?.[0]?.delta?.content;
                if (delta) {
                  fullReply += delta;
                  span.textContent = fullReply;
                  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                }
              } catch(e) {}
            }
          }
        }

        messages.push({ role: 'assistant', content: fullReply });

      } catch (err) {
        span.textContent = 'Error: ' + err.message;
      }
    }

    function appendMessage(type, text) {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = text;
      document.getElementById('chat').appendChild(div);
    }

    document.getElementById('msg').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
