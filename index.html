<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Phone AI</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 1rem auto; padding: 0 1rem; }
    #chat { border: 1px solid #ccc; height: 350px; overflow-y: auto; padding: 0.5rem; margin-bottom: 0.5rem; }
    .user { color: #0066cc; margin: 0.3rem 0; }
    .ai { color: #2d8a2d; margin: 0.3rem 0; }
    input { width: 75%; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h3>🤖 My AI Assistant</h3>
  <div id="chat"></div>
  <input type="text" id="msg" placeholder="Ask something...">
  <button onclick="send()">Send</button>

  <script>
    //
    const API_KEY = 'sk-5d6cb9965b524f86a8ca1921213ac1d8';
    const API_URL = 'https://api.deepseek.com/v1/chat/completions';

    // Conversation memory (starts with an optional system message)
    let messages = [
      // { role: 'system', content: 'You are a helpful assistant.' } // uncomment to set personality
    ];

    async function send() {
      const input = document.getElementById('msg');
      const userMessage = input.value.trim();
      if (!userMessage) return;

      // Add user message to memory and display it
      messages.push({ role: 'user', content: userMessage });
      appendMessage('user', 'You: ' + userMessage);
      input.value = '';

      // Create a placeholder for the streaming AI reply
      const aiDiv = document.createElement('div');
      aiDiv.className = 'ai';
      aiDiv.innerHTML = '<strong>AI:</strong> <span id="stream-out"></span>';
      document.getElementById('chat').appendChild(aiDiv);
      const streamSpan = aiDiv.querySelector('#stream-out');
      // We'll need a unique id for concurrent messages? For simplicity, we only allow one message at a time.
      // Better: use a class and track the last streaming element.
      // Let's just store a reference.

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: messages,
            stream: true
          })
        });

        if (!response.ok) {
          throw new Error('API error: ' + response.status);
        }

        // Handle streaming
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const dataStr = line.slice(6).trim();
              if (dataStr === '[DONE]') continue;
              try {
                const json = JSON.parse(dataStr);
                const delta = json.choices?.[0]?.delta?.content;
                if (delta) {
                  fullReply += delta;
                  // Update the streaming text
                  streamSpan.textContent = fullReply;
                  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                }
              } catch (e) {
                // ignore malformed JSON chunks
              }
            }
          }
        }

        // After streaming is done, add the full reply to memory
        messages.push({ role: 'assistant', content: fullReply });
        // Remove the temporary span, just leave the text
        aiDiv.innerHTML = '<strong>AI:</strong> ' + fullReply;

      } catch (err) {
        aiDiv.innerHTML = '<strong>AI:</strong> Error: ' + err.message;
      }
    }

    function appendMessage(type, text) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('msg').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
